<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
   <h1>🚖 TAXI ADMIN 🚖</h1>
<p class="subtitle">
    Centre de gestion administrateur
</p>

<div class="stats-grid">
    <div class="stat-card">
        <h2>🚖 Courses</h2>
        <p id="total">0 €</p>
    </div>

    <div class="stat-card">
        <h2>💰 Société</h2>
        <p id="company">0 €</p>
    </div>

    <div class="stat-card">
        <h2>💸 Dépenses</h2>
        <p id="totalExpenses">0 €</p>
    </div>

    <div class="stat-card">
        <h2>📈 Bénéfice Net</h2>
        <p id="netProfit">0 €</p>
    </div>
</div>
    <div class="admin-menu">
        <a href="transactions.html" class="menu-btn">
            🚖 Historique Courses
        </a>

        <a href="drivers.html" class="menu-btn">
            👨‍✈️ Gestion Chauffeurs
        </a>

        <a href="expenses.html" class="menu-btn">
            💸 Gestion Dépenses
        </a>

        <a href="salaries.html" class="menu-btn">
            📊 Salaires Chauffeurs
        </a>
    </div>

    <hr>

    <h2>🔄 Fin de semaine</h2>

    <button onclick="resetWeek()">
        Remettre toute la semaine à zéro
    </button>

    <p id="resetMessage"></p>

    <button onclick="logout()">Déconnexion</button>
<div id="transactions" style="display:none;"></div>
<script src="app.js"></script>

</body>
</html>
