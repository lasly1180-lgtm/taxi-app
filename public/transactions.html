<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique Courses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚖 Historique des Courses</h1>


<h2>✏️ Modifier une course</h2>

<input
    type="number"
    id="updateTransactionId"
    placeholder="ID de la course"
/>

<input
    type="number"
    id="newTotalAmount"
    placeholder="Nouveau montant"
/>

<button onclick="updateTransaction()">
    Modifier
</button>

<p id="updateTransactionMessage"></p>

<hr>
<h2>🗑️ Supprimer une course</h2>

<input
    type="number"
    id="deleteTransactionId"
    placeholder="ID de la course"
/>

<button onclick="deleteTransaction()">
    Supprimer
</button>

<p id="deleteTransactionMessage"></p>

<hr>
<input
    type="number"
    id="deleteTransactionId"
    placeholder="ID de la course"
/>

<button onclick="deleteTransaction()">
    Supprimer
</button>

<p id="deleteTransactionMessage"></p>

<hr>

    <div id="transactions"></div>

    <br>

    <a href="admin.html">
        <button>⬅ Retour Admin</button>
    </a>
</div>

<script src="app.js"></script>

</body>
</html>
